name: Release Platform Chart

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  CHART_NAME: acornops-platform
  CHART_DIR: kubernetes/helm/acornops-platform

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: |
          helm lint "${CHART_DIR}" --strict
          for values in "${CHART_DIR}"/examples/*.yaml; do
            helm lint "${CHART_DIR}" --strict -f "${values}"
          done
          helm lint "${CHART_DIR}" --strict \
            --set-string auth.oidc.tls.additionalCaBundle.configMapKeyRef.name=organization-trust-bundle \
            --set-string auth.oidc.tls.additionalCaBundle.configMapKeyRef.key=ca.crt
          helm lint "${CHART_DIR}" --strict \
            --set-string auth.oidc.tls.additionalCaBundle.secretKeyRef.name=organization-trust-bundle \
            --set-string auth.oidc.tls.additionalCaBundle.secretKeyRef.key=ca.crt

      - name: Render chart
        run: |
          helm template acornops "${CHART_DIR}" --namespace acornops >/tmp/acornops-platform.yaml
          helm template acornops "${CHART_DIR}" --namespace acornops -f "${CHART_DIR}/examples/values-production.yaml" >/tmp/acornops-platform-production.yaml

      - name: Log in to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" --username "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: |
          helm package "${CHART_DIR}" \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}"

      - name: Push chart
        run: helm push "${CHART_NAME}-${{ steps.version.outputs.version }}.tgz" "oci://${REGISTRY}/acornops/charts"

      - name: Create charts repo token
        id: charts-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CHART_PUBLISHER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CHART_PUBLISHER_APP_PRIVATE_KEY }}
          owner: acornops
          repositories: charts
          permission-contents: write

      - name: Notify charts repo
        env:
          GH_TOKEN: ${{ steps.charts-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh api repos/acornops/charts/dispatches \
            --method POST \
            --field event_type=helm-chart-released \
            --field client_payload[chart]=acornops-platform \
            --field client_payload[version]="$VERSION"
