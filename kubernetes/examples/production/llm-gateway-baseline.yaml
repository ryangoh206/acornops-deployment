apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway-config
  namespace: acornops
data:
  APP_ENV: production
  AUTH_JWKS_URL: http://control-plane:8081/api/v1/auth/jwks.json
  AUTH_ISSUER: llm-gateway
  AUTH_AUDIENCE: execution-gateway
  ENABLE_API_DOCS: "false"
  JWKS_CACHE_TTL_SECONDS: "300"
  JWKS_READINESS_MAX_STALENESS_SECONDS: "900"
  REQUIRE_JWKS_READINESS: "true"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  LLM_RATE_LIMIT_PER_WINDOW: "100"
  TOOL_RATE_LIMIT_PER_WINDOW: "200"
  REQUIRE_REDIS_RATE_LIMITS_IN_PRODUCTION: "true"
  SECRETS_CACHE_TTL_SEC: "0"
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-gateway-secrets
  namespace: acornops
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://gateway_user:replace-me@gateway-postgres:5432/gateway
  REDIS_URL: redis://gateway-redis:6379/0
  SECRETS_BACKEND: database
  SECRETS_KEK_BASE64: replace-me-with-generated-32-byte-base64
  ADMIN_API_TOKEN: replace-me-with-generated-token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: acornops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: llm-gateway
          image: ghcr.io/acornops/llm-gateway:0.0.1-experimental.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: llm-gateway-config
            - secretRef:
                name: llm-gateway-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: acornops
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: llm-gateway
  ports:
    - name: http
      port: 8001
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: llm-gateway
  namespace: acornops
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-gateway
