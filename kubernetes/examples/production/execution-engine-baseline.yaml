apiVersion: v1
kind: ConfigMap
metadata:
  name: execution-engine-config
  namespace: acornops
data:
  APP_ENV: production
  ORCH_BASE_URL: http://control-plane:8081
  EXECUTION_GATEWAY_BASE_URL: http://llm-gateway:8001
  ENABLE_API_DOCS: "false"
  EXECUTION_DURABILITY_KEY_PREFIX: execution-engine
  TERMINAL_RUN_TTL_SECONDS: "3600"
  TERMINAL_COMMIT_RETENTION_SECONDS: "86400"
  TERMINAL_COMMIT_RETRY_INTERVAL_SECONDS: "5"
  STALE_ACTIVE_RUN_RECOVERY_ON_STARTUP: "true"
  READINESS_CHECK_TIMEOUT_MS: "1000"
  RUN_ID_LOCK_TTL_SECONDS: "900"
  ORCH_RETRY_MAX_ELAPSED_SECONDS: "30"
  GATEWAY_STREAM_IDLE_TIMEOUT_SECONDS: "60"
  TOOL_CALL_TIMEOUT_SECONDS: "30"
  DISPATCH_REQUEST_TIMEOUT_SECONDS: "10"
  MAX_REQUEST_BODY_BYTES: "1000000"
---
apiVersion: v1
kind: Secret
metadata:
  name: execution-engine-secrets
  namespace: acornops
type: Opaque
stringData:
  ORCH_SERVICE_TOKEN: replace-me-with-generated-token
  EXECUTION_ENGINE_DISPATCH_TOKEN: replace-me-with-generated-token
  REDIS_URL: redis://cp-redis:6379/1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution-engine
  namespace: acornops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: execution-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: execution-engine
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: execution-engine
          image: ghcr.io/acornops/execution-engine:0.0.1-experimental.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: execution-engine-config
            - secretRef:
                name: execution-engine-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: execution-engine
  namespace: acornops
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: execution-engine
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: execution-engine
  namespace: acornops
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: execution-engine
