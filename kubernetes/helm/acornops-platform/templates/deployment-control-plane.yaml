{{- $additionalCaArgs := dict "root" . "component" "controlPlane" -}}
{{- $additionalCaBundle := include "acornops-platform.additionalCaBundle" $additionalCaArgs | fromYaml -}}
{{- $additionalCaEnabled := include "acornops-platform.additionalCaEnabled" $additionalCaArgs -}}
{{- if .Values.components.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acornops-platform.componentFullname" (dict "root" . "component" "control-plane") }}
  labels:
    {{- include "acornops-platform.componentLabels" (dict "root" . "component" "control-plane") | nindent 4 }}
  {{- with .Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.components.controlPlane.replicas }}
  selector:
    matchLabels:
      {{- include "acornops-platform.selectorLabels" (dict "root" . "component" "control-plane") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "acornops-platform.selectorLabels" (dict "root" . "component" "control-plane") | nindent 8 }}
        {{- with .Values.components.controlPlane.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.components.controlPlane.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.components.controlPlane.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.components.controlPlane.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "acornops-platform.componentFullname" (dict "root" . "component" "control-plane") }}
      {{- end }}
      containers:
        - name: control-plane
          image: {{ include "acornops-platform.image" (dict "root" . "image" .Values.components.controlPlane.image) | quote }}
          imagePullPolicy: {{ .Values.components.controlPlane.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.components.controlPlane.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.components.controlPlane.service.targetPort }}
              protocol: TCP
            {{- if .Values.internalTransport.tls.enabled }}
            - name: internal-mtls
              containerPort: {{ .Values.internalTransport.tls.controlPlane.internalPort }}
              protocol: TCP
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if $additionalCaEnabled }}
            - name: additional-ca
              mountPath: {{ include "acornops-platform.additionalCaPath" . | quote }}
              subPath: additional-ca.pem
              readOnly: true
            {{- end }}
            {{- if .Values.internalTransport.tls.enabled }}
            - name: internal-transport-ca
              mountPath: {{ printf "%s/ca" (include "acornops-platform.internalTlsMountPath" .) | quote }}
              readOnly: true
            - name: internal-transport-control-plane
              mountPath: {{ printf "%s/control-plane" (include "acornops-platform.internalTlsMountPath" .) | quote }}
              readOnly: true
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "acornops-platform.componentFullname" (dict "root" . "component" "control-plane") }}
            {{- with .Values.components.controlPlane.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: CONTROL_PLANE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-platform.secretName" . }}
                  key: {{ .Values.secrets.keys.controlPlane.databaseUrl }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-platform.secretName" . }}
                  key: {{ .Values.secrets.keys.controlPlane.redisUrl }}
            {{- if .Values.auth.oidc.enabled }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ required "auth.oidc.clientSecret.existingSecret is required when OIDC is enabled" .Values.auth.oidc.clientSecret.existingSecret | quote }}
                  key: {{ required "auth.oidc.clientSecret.key is required when OIDC is enabled" .Values.auth.oidc.clientSecret.key | quote }}
            {{- end }}
            - name: CSRF_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-platform.secretName" . }}
                  key: {{ .Values.secrets.keys.controlPlane.csrfSecret }}
            - name: ORCH_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-platform.secretName" . }}
                  key: {{ .Values.secrets.keys.controlPlane.orchestrationServiceToken }}
            - name: EXTERNAL_INTEGRATION_CLIENTS_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-platform.secretName" . }}
                  key: {{ .Values.secrets.keys.controlPlane.externalIntegrationClientsJson }}
            - name: EXECUTION_ENGINE_DISPATCH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-platform.secretName" . }}
                  key: {{ .Values.secrets.keys.executionEngine.dispatchToken }}
            - name: LLM_GATEWAY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-platform.secretName" . }}
                  key: {{ .Values.secrets.keys.llmGateway.adminToken }}
            - name: GATEWAY_SIGNING_PRIVATE_KEY_PEM_B64
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-platform.secretName" . }}
                  key: {{ .Values.secrets.keys.controlPlane.gatewaySigningPrivateKeyPemB64 }}
            - name: WEBHOOK_SECRET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-platform.secretName" . }}
                  key: {{ .Values.secrets.keys.controlPlane.webhookSecretEncryptionKey }}
            {{- if .Values.adminApi.enabled }}
            - name: CONTROL_PLANE_ADMIN_TOKENS_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "acornops-platform.secretName" .) .Values.adminApi.tokens.existingSecretName | quote }}
                  key: {{ required "adminApi.tokens.tokensJsonKey is required when adminApi.enabled=true" .Values.adminApi.tokens.tokensJsonKey | quote }}
            {{- end }}
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-platform.secretName" . }}
                  key: {{ .Values.secrets.keys.controlPlane.smtpUsername }}
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-platform.secretName" . }}
                  key: {{ .Values.secrets.keys.controlPlane.smtpPassword }}
                  optional: true
            {{- if $additionalCaEnabled }}
            - name: ADDITIONAL_CA_BUNDLE_FILE
              value: {{ include "acornops-platform.additionalCaPath" . | quote }}
            - name: NODE_EXTRA_CA_CERTS
              value: {{ include "acornops-platform.additionalCaPath" . | quote }}
            {{- end }}
            {{- with .Values.components.controlPlane.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          resources:
            {{- toYaml .Values.components.controlPlane.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with $additionalCaBundle.configMapKeyRef }}
        - name: additional-ca
          configMap:
            name: {{ .name | quote }}
            items:
              - key: {{ .key | quote }}
                path: additional-ca.pem
        {{- end }}
        {{- with $additionalCaBundle.secretKeyRef }}
        - name: additional-ca
          secret:
            secretName: {{ .name | quote }}
            items:
              - key: {{ .key | quote }}
                path: additional-ca.pem
        {{- end }}
        {{- if .Values.internalTransport.tls.enabled }}
        - name: internal-transport-ca
          secret:
            secretName: {{ required "internalTransport.tls.ca.secretName is required when internal TLS is enabled" .Values.internalTransport.tls.ca.secretName | quote }}
            items:
              - key: {{ .Values.internalTransport.tls.ca.key | quote }}
                path: {{ .Values.internalTransport.tls.ca.key | quote }}
        - name: internal-transport-control-plane
          secret:
            secretName: {{ required "internalTransport.tls.certificates.controlPlane.secretName is required when internal TLS is enabled" .Values.internalTransport.tls.certificates.controlPlane.secretName | quote }}
            items:
              - key: {{ .Values.internalTransport.tls.certificates.controlPlane.certKey | quote }}
                path: {{ .Values.internalTransport.tls.certificates.controlPlane.certKey | quote }}
              - key: {{ .Values.internalTransport.tls.certificates.controlPlane.keyKey | quote }}
                path: {{ .Values.internalTransport.tls.certificates.controlPlane.keyKey | quote }}
        {{- end }}
      {{- include "acornops-platform.workloadScheduling" (dict "values" .Values.components.controlPlane) | nindent 6 }}
{{- end }}
