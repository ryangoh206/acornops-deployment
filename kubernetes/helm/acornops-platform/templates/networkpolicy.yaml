    - to:
        {{- toYaml $np.redis.to | nindent 8 }}
      ports:
        {{- toYaml $np.redis.ports | nindent 8 }}
    {{- end }}
    {{- with $np.extraEgress.controlPlane }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
