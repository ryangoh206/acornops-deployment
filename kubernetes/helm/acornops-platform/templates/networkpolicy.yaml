    matchLabels:
      {{- include "acornops-platform.selectorLabels" (dict "root" . "component" "control-plane") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    {{- if .Values.components.executionEngine.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "acornops-platform.selectorLabels" (dict "root" . "component" "execution-engine") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.components.executionEngine.service.targetPort }}
    {{- end }}
    {{- if .Values.components.llmGateway.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "acornops-platform.selectorLabels" (dict "root" . "component" "llm-gateway") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.components.llmGateway.service.targetPort }}
    {{- end }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "acornops-platform.selectorLabels" (dict "root" . "component" "control-plane") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ ternary .Values.internalTransport.tls.controlPlane.internalPort .Values.components.controlPlane.service.targetPort .Values.internalTransport.tls.enabled }}
    {{- if and $np.dns.enabled $np.dns.to }}
    - to:
        {{- toYaml $np.dns.to | nindent 8 }}
      ports:
        {{- toYaml $np.dns.ports | nindent 8 }}
    {{- end }}
    {{- if and $np.publicInternet.enabled $np.publicInternet.to }}
    - to:
        {{- toYaml $np.publicInternet.to | nindent 8 }}
      ports:
        {{- toYaml $np.publicInternet.ports | nindent 8 }}
    {{- end }}
    {{- if $np.postgres.to }}
    - to:
        {{- toYaml $np.postgres.to | nindent 8 }}
      ports:
        {{- toYaml $np.postgres.ports | nindent 8 }}
    {{- end }}
