{{- if .Values.networkPolicies.enabled }}
{{- $np := .Values.networkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "acornops-platform.fullname" . }}-default-deny
  labels:
    {{- include "acornops-platform.labels" . | nindent 4 }}
  {{- with .Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "acornops-platform.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
{{- if .Values.components.managementConsole.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "acornops-platform.componentFullname" (dict "root" . "component" "management-console") }}-ingress
  labels:
    {{- include "acornops-platform.componentLabels" (dict "root" . "component" "management-console") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "acornops-platform.selectorLabels" (dict "root" . "component" "management-console") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- with $np.ingressController.from }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.components.managementConsole.service.targetPort }}
    {{- end }}
{{- end }}
{{- if .Values.components.controlPlane.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "acornops-platform.componentFullname" (dict "root" . "component" "control-plane") }}-ingress
  labels:
    {{- include "acornops-platform.componentLabels" (dict "root" . "component" "control-plane") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "acornops-platform.selectorLabels" (dict "root" . "component" "control-plane") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- with $np.ingressController.from }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.components.controlPlane.service.targetPort }}
    {{- end }}
    {{- if .Values.components.executionEngine.enabled }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "acornops-platform.selectorLabels" (dict "root" . "component" "execution-engine") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ ternary .Values.internalTransport.tls.controlPlane.internalPort .Values.components.controlPlane.service.targetPort .Values.internalTransport.tls.enabled }}
    {{- end }}
    {{- if .Values.components.llmGateway.enabled }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "acornops-platform.selectorLabels" (dict "root" . "component" "llm-gateway") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ ternary .Values.internalTransport.tls.controlPlane.internalPort .Values.components.controlPlane.service.targetPort .Values.internalTransport.tls.enabled }}
    {{- end }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "acornops-platform.selectorLabels" (dict "root" . "component" "control-plane") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ ternary .Values.internalTransport.tls.controlPlane.internalPort .Values.components.controlPlane.service.targetPort .Values.internalTransport.tls.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "acornops-platform.componentFullname" (dict "root" . "component" "control-plane") }}-egress
  labels:
