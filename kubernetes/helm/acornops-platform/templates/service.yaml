{{- $components := dict "management-console" .Values.components.managementConsole "control-plane" .Values.components.controlPlane "execution-engine" .Values.components.executionEngine "llm-gateway" .Values.components.llmGateway -}}
{{- range $component, $values := $components }}
{{- if $values.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "acornops-platform.componentFullname" (dict "root" $ "component" $component) }}
  labels:
    {{- include "acornops-platform.componentLabels" (dict "root" $ "component" $component) | nindent 4 }}
  {{- with $.Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if and (eq $component "control-plane") $.Values.internalTransport.tls.enabled }}
    - name: internal-mtls
      port: {{ $.Values.internalTransport.tls.controlPlane.internalPort }}
      targetPort: internal-mtls
      protocol: TCP
    {{- end }}
  selector:
    {{- include "acornops-platform.selectorLabels" (dict "root" $ "component" $component) | nindent 4 }}
{{- end }}
{{- end }}
