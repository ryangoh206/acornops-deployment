# Example overlay for a single-node k3s deployment that uses Traefik and an
# in-cluster Keycloak issuer exposed publicly on a separate identity hostname.
# This chart still expects Postgres, Redis, Keycloak, and cert-manager to be
# installed outside the acornops-platform release.

platform:
  publicUrl: https://api.demo.acornops.dev
  consoleUrl: https://console.demo.acornops.dev

exposure:
  ingress:
    enabled: true
    className: traefik
    apiHost: api.demo.acornops.dev
    consoleHost: console.demo.acornops.dev
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      enabled: true
      secretName: acornops-demo-tls

auth:
  oidc:
    enabled: true
    issuerUrl: http://acornops-keycloak.acornops-identity.svc.cluster.local/realms/acornops
    publicIssuerUrl: https://identity.demo.acornops.dev/realms/acornops
    clientId: acornops-control-plane
    clientSecret:
      existingSecret: acornops-platform-secrets
      key: OIDC_CLIENT_SECRET
    authorizationEndpoint: https://identity.demo.acornops.dev/realms/acornops/protocol/openid-connect/auth
    tokenEndpoint: http://acornops-keycloak.acornops-identity.svc.cluster.local/realms/acornops/protocol/openid-connect/token
    userInfoEndpoint: http://acornops-keycloak.acornops-identity.svc.cluster.local/realms/acornops/protocol/openid-connect/userinfo
    jwksUriOverride: http://acornops-keycloak.acornops-identity.svc.cluster.local/realms/acornops/protocol/openid-connect/certs
    logout:
      endSessionEndpointOverride: https://identity.demo.acornops.dev/realms/acornops/protocol/openid-connect/logout
  password:
    enabled: false
    signupEnabled: false

email:
  deliveryMode: disabled

ai:
  defaultProvider: openai
  defaultModel: gpt-5.5
  allowedProviders: openai,anthropic,gemini
  allowedProviderModels: "openai:gpt-5.5|gpt-5.4|gpt-5.4-mini|gpt-5.4-nano|gpt-5|gpt-5-mini|gpt-5-nano;anthropic:claude-fable-5|claude-opus-4-8|claude-sonnet-4-6|claude-haiku-4-5;gemini:gemini-3.5-flash|gemini-3.5-flash-lite|gemini-3.1-pro|gemini-3.1-flash|gemini-3.1-flash-lite|gemini-2.5-pro|gemini-2.5-flash|gemini-2.5-flash-lite|gemini-2.0-flash|gemini-2.0-flash-lite"

agentGateway:
  distributedRouting:
    enabled: false

networkPolicies:
  ingressController:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
  postgres:
    to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: acornops-data
    ports:
      - protocol: TCP
        port: 5432
  redis:
    to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: acornops-data
    ports:
      - protocol: TCP
        port: 6379
  oidc:
    to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: acornops-identity
        podSelector:
          matchLabels:
            app.kubernetes.io/name: keycloak
            app.kubernetes.io/instance: acornops-keycloak
    ports:
      - protocol: TCP
        port: 80
      - protocol: TCP
        port: 8080

components:
  managementConsole:
    replicas: 1
    podDisruptionBudget:
      enabled: false
  controlPlane:
    replicas: 1
    podDisruptionBudget:
      enabled: false
  executionEngine:
    replicas: 1
    podDisruptionBudget:
      enabled: false
  llmGateway:
    replicas: 1
    podDisruptionBudget:
      enabled: false
