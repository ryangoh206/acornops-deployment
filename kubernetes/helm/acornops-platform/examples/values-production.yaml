# Production operator template for the central AcornOps platform.
# The chart expects external Postgres, Redis, and a pre-created Secret.

platform:
  # Public API base URL used by agents and backend-to-frontend links.
  publicUrl: https://api.acornops.dev
  # Public browser URL for the management console.
  consoleUrl: https://console.acornops.dev

exposure:
  ingress:
    enabled: true
    className: nginx
    apiHost: api.acornops.dev
    consoleHost: console.acornops.dev
    tls:
      enabled: true
      secretName: acornops-platform-tls
    # Add cert-manager, external-dns, or ingress-controller annotations here.
    annotations: {}

secrets:
  # Create this Secret before installing the chart.
  existingSecretName: acornops-platform-secrets
  keys:
    controlPlane:
      databaseUrl: CONTROL_PLANE_DATABASE_URL
      redisUrl: CONTROL_PLANE_REDIS_URL
      csrfSecret: CSRF_SECRET
      gatewaySigningPrivateKeyPemB64: GATEWAY_SIGNING_PRIVATE_KEY_PEM_B64
      orchestrationServiceToken: ORCH_SERVICE_TOKEN
      externalIntegrationClientsJson: EXTERNAL_INTEGRATION_CLIENTS_JSON
      webhookSecretEncryptionKey: WEBHOOK_SECRET_ENCRYPTION_KEY
      smtpUsername: SMTP_USERNAME
      smtpPassword: SMTP_PASSWORD
    executionEngine:
      redisUrl: EXECUTION_ENGINE_REDIS_URL
      dispatchToken: EXECUTION_ENGINE_DISPATCH_TOKEN
    llmGateway:
      databaseUrl: LLM_GATEWAY_DATABASE_URL
      redisUrl: LLM_GATEWAY_REDIS_URL
      adminToken: LLM_GATEWAY_ADMIN_TOKEN
      secretsKekBase64: SECRETS_KEK_BASE64
      vaultToken: VAULT_TOKEN

auth:
  oidc:
    enabled: true
    providerName: oidc
    issuerUrl: https://keycloak.acornops.dev/realms/acornops
    publicIssuerUrl: ""
    clientId: acornops-control-plane
    clientSecret:
      existingSecret: acornops-platform-secrets
      key: OIDC_CLIENT_SECRET
    httpTimeoutMs: 10000
    admission:
      requireVerifiedEmail: true
    logout:
      endSessionEndpointOverride: https://keycloak.acornops.dev/realms/acornops/protocol/openid-connect/logout
      postLogoutRedirectUri: https://console.example.com/api/v1/auth/oidc/logout/callback
  password:
    # Disable this if production should be OIDC-only.
    enabled: true
    # Keep false unless this is a reviewed private deployment.
    signupEnabled: false
    emailVerificationRequired: true
    resetEnabled: true

email:
  deliveryMode: smtp
  from: "AcornOps <noreply@example.com>"
  # Defaults to platform.consoleUrl when empty.
  publicBaseUrl: ""
  smtp:
    host: smtp.example.com
    port: 587
    secure: false
    requireTls: true

adminApi:
  # Keep disabled unless this environment has an operator-held admin token.
  enabled: false
  ingress:
    enabled: false
  tokens:
    # Store CONTROL_PLANE_ADMIN_TOKENS_JSON in this Secret as hash descriptors.
    existingSecretName: acornops-platform-secrets
    tokensJsonKey: CONTROL_PLANE_ADMIN_TOKENS_JSON

workspacePlans:
  defaultPlanKey: default
  plans:
    - key: default
      name: Default
      quotas:
        members: 100
        kubernetesClusters: 30
        virtualMachines: 30

ai:
  # Global defaults used when workspaces do not override model policy.
  defaultProvider: openai
  defaultModel: gpt-5.5
  allowedProviders: openai,anthropic,gemini
  allowedProviderModels: "openai:gpt-5.5|gpt-5.4|gpt-5.4-mini|gpt-5.4-nano|gpt-5|gpt-5-mini|gpt-5-nano;anthropic:claude-fable-5|claude-opus-4-8|claude-sonnet-4-6|claude-haiku-4-5;gemini:gemini-3.5-flash|gemini-3.5-flash-lite|gemini-3.1-pro|gemini-3.1-flash|gemini-3.1-flash-lite|gemini-2.5-pro|gemini-2.5-flash|gemini-2.5-flash-lite|gemini-2.0-flash|gemini-2.0-flash-lite"
  gatewayTimeoutMs: 120000

agentGateway:
  distributedRouting:
    enabled: true
    ownerTtlSeconds: 90
  snapshotIntervalSeconds: 60
  maxWebSocketPayloadBytes: 3145728

assistantRuntime:
  contextMaxTokens: 120000
  budgetCents: 25
  maxRuntimeMs: 600000
  writeConfirmationRequired: true
  writeConfirmationTimeoutSeconds: 900

targetAgents:
  agentk:
    helm:
      releaseName: acornops-agentk
      chartRef: oci://ghcr.io/acornops/charts/acornops-agentk
      namespace: acornops-agentk

internalTransport:
  tls:
    # Disabled by default. Enable only after creating the CA and per-service TLS Secrets.
    enabled: false
    ca:
      secretName: ""
    certificates:
      controlPlane:
        secretName: ""
      executionEngine:
        secretName: ""
      llmGateway:
        secretName: ""

networkPolicies:
  enabled: true
  ingressController:
    # Change this if your ingress controller is not in ingress-nginx.
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx
  # Replace the public CIDR defaults below when Postgres or Redis are private.
  # Example:
  # postgres:
  #   to:
  #     - ipBlock:
  #         cidr: 10.20.30.40/32
  # redis:
  #   to:
  #     - ipBlock:
  #         cidr: 10.20.30.41/32
  # Configure private OIDC and webhook destinations explicitly. NetworkPolicy
  # accepts selectors or CIDRs, not DNS hostnames.
  oidc:
    to: []
  webhooks:
    to: []
  # Use extraEgress for other private component-specific destinations such as MCP.
  extraEgress:
    controlPlane: []
    executionEngine: []
    llmGateway: []
    controlPlaneMigrate: []
    llmGatewayMigrate: []

components:
  managementConsole:
    replicas: 3
    podDisruptionBudget:
      enabled: true
      minAvailable: 2
  controlPlane:
    replicas: 3
    apiDocsEnabled: false
    terminationGracePeriodSeconds: 45
    webhookEgress:
      # Required in addition to networkPolicies.webhooks.to for private webhook hosts.
      allowedPrivateHosts: []
    webhookDelivery:
      # Set enabled=false during maintenance to pause claims while preserving queued events.
      enabled: true
      batchSize: 50
      concurrency: 20
      perOriginConcurrency: 4
      maxAttempts: 10
      maxRetryAgeSeconds: 86400
      maxPayloadBytes: 65536
      maxSubscriptionsPerWorkspace: 100
    podDisruptionBudget:
      enabled: true
      minAvailable: 2
  executionEngine:
    replicas: 3
    apiDocsEnabled: false
    toolContext:
      maxBytes: 12288
      runMaxBytes: 49152
      gatewayMaxResponseBytes: 5242880
    podDisruptionBudget:
      enabled: true
      minAvailable: 2
  llmGateway:
    replicas: 3
    apiDocsEnabled: false
    builtinMcpMaxResponseBytes: 3145728
    # Keep plaintext secret caching disabled in production.
    secretsCacheTtlSeconds: 0
    # Set secretsBackend: vault and configure vault fields if using Vault.
    secretsBackend: database
    vault:
      addr: ""
      namespace: ""
      mount: secret
      pathPrefix: acornops
      timeoutMs: 5000
      verifyTls: true
    # Private MCP endpoints also require an exact allowedHosts entry,
    # networkPolicies.extraEgress.llmGateway, and an additional CA bundle.
    # mcpEgress:
    #   allowedHosts: test-mcp.app.internal.org
    podDisruptionBudget:
      enabled: true
      minAvailable: 2
