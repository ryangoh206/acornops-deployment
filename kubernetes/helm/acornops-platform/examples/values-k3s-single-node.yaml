platform:
  publicUrl: http://acornops.local
  consoleUrl: http://console.acornops.local

exposure:
  ingress:
    className: traefik
    apiHost: acornops.local
    consoleHost: console.acornops.local
    tls:
      enabled: false
      secretName: ""

agentGateway:
  distributedRouting:
    enabled: false

auth:
  oidc:
    issuerUrl: https://identity.acornops.local/realms/acornops

ai:
  defaultProvider: openai
  defaultModel: gpt-5.5
  allowedProviders: openai,anthropic,gemini
  allowedProviderModels: "openai:gpt-5.5|gpt-5.4|gpt-5.4-mini|gpt-5.4-nano|gpt-5|gpt-5-mini|gpt-5-nano;anthropic:claude-fable-5|claude-opus-4-8|claude-sonnet-4-6|claude-haiku-4-5;gemini:gemini-3.5-flash|gemini-3.5-flash-lite|gemini-3.1-pro|gemini-3.1-flash|gemini-3.1-flash-lite|gemini-2.5-pro|gemini-2.5-flash|gemini-2.5-flash-lite|gemini-2.0-flash|gemini-2.0-flash-lite"

networkPolicies:
  ingressController:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system

components:
  managementConsole:
    replicas: 1
    podDisruptionBudget:
      enabled: false
  controlPlane:
    replicas: 1
    podDisruptionBudget:
      enabled: false
  executionEngine:
    replicas: 1
    podDisruptionBudget:
      enabled: false
  llmGateway:
    replicas: 1
    podDisruptionBudget:
      enabled: false
