services:
  management-console:
    build:
      context: ../../../management-console
      dockerfile: Dockerfile
      target: dev
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/}
        VITE_APP_DATA_MODE: ${VITE_APP_DATA_MODE:-control-plane}
        VITE_CONTROL_PLANE_API_BASE_URL: ${VITE_CONTROL_PLANE_API_BASE_URL:-}
    image: acornops/management-console:local
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173", "--strictPort"]
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/}
      VITE_APP_DATA_MODE: ${VITE_APP_DATA_MODE:-control-plane}
      VITE_CONTROL_PLANE_API_BASE_URL: ${VITE_CONTROL_PLANE_API_BASE_URL:-}
    volumes:
      - ../../../management-console:/app
      - management-console-node-modules:/app/node_modules
    healthcheck:
      disable: true

  edge-proxy:
    profiles:
      - local
    environment:
      MANAGEMENT_CONSOLE_UPSTREAM: management-console:5173
      API_HOST: ${API_HOST:-acornops.localhost}
      MANAGEMENT_CONSOLE_HOST: ${MANAGEMENT_CONSOLE_HOST:-console.acornops.localhost}
      CONTROL_PLANE_HOST: ${CONTROL_PLANE_HOST:-control-plane.acornops.localhost}
      LLM_GATEWAY_HOST: ${LLM_GATEWAY_HOST:-llm-gateway.acornops.localhost}
      EXECUTION_ENGINE_HOST: ${EXECUTION_ENGINE_HOST:-execution-engine.acornops.localhost}
    ports:
      - "${EDGE_PROXY_HTTP_PORT:-8088}:80"
    volumes:
      - ./proxy/nginx.local.conf.template:/etc/nginx/templates/default.conf.template:ro

  control-plane:
    build:
      context: ../../../control-plane
      dockerfile: Dockerfile
      target: dev
    image: acornops/control-plane:local
    command: ["npm", "run", "dev"]
    environment:
      NODE_ENV: development
      ENABLE_API_DOCS: ${CP_ENABLE_API_DOCS:-true}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      CONTROL_PLANE_BASE_URL: http://${CONTROL_PLANE_HOST:-control-plane.acornops.localhost}:${EDGE_PROXY_HTTP_PORT:-8088}
      MANAGEMENT_CONSOLE_BASE_URL: http://${MANAGEMENT_CONSOLE_HOST:-console.acornops.localhost}:${EDGE_PROXY_HTTP_PORT:-8088}
      CONTROL_PLANE_DISTRIBUTED_ROUTING_ENABLED: ${CONTROL_PLANE_DISTRIBUTED_ROUTING_ENABLED:-false}
      CONTROL_PLANE_AGENT_OWNER_TTL_SECONDS: ${CONTROL_PLANE_AGENT_OWNER_TTL_SECONDS:-90}
      CONTROL_PLANE_AGENT_SNAPSHOT_INTERVAL_SECONDS: ${CONTROL_PLANE_AGENT_SNAPSHOT_INTERVAL_SECONDS:-60}
      CORS_ORIGIN: http://${MANAGEMENT_CONSOLE_HOST:-console.acornops.localhost}:${EDGE_PROXY_HTTP_PORT:-8088}
      CSRF_SECRET: ${CSRF_SECRET:-dev_csrf_secret_change_me_32_bytes_minimum}
      SEED_DEVELOPMENT_DATA: "true"
      SEED_VM_AGENT_KEY: ${LOCAL_VM_AGENT_KEY:-ak_local_vm_dev_shared_key}
      CONVERSATION_RETENTION_DAYS: ${CONVERSATION_RETENTION_DAYS:-30}
      CONVERSATION_RETENTION_JOB_INTERVAL_SECONDS: ${CONVERSATION_RETENTION_JOB_INTERVAL_SECONDS:-3600}
      TARGET_CHAT_RECENT_ACTIVITY_WINDOW_SECONDS: ${TARGET_CHAT_RECENT_ACTIVITY_WINDOW_SECONDS:-300}
      RUN_EVENT_BUFFER_SIZE: ${RUN_EVENT_BUFFER_SIZE:-200}
      PERSIST_RUN_EVENTS: ${PERSIST_RUN_EVENTS:-true}
      WORKSPACE_ROLES_CONFIG_JSON: ${WORKSPACE_ROLES_CONFIG_JSON:-}
      SEED_AGENT_KEY: ${LOCAL_AGENT_KEY:-ak_local_dev_shared_key}
      AGENT_HELM_RELEASE_NAME: ${AGENT_HELM_RELEASE_NAME:-acornops-agent}
      AGENT_HELM_CHART_REF: ${AGENT_HELM_CHART_REF:-oci://ghcr.io/acornops/charts/acornops-k8s-agent}
      AGENT_HELM_NAMESPACE: ${AGENT_HELM_NAMESPACE:-acornops}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-dex}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://dex:5556/dex}
      OIDC_PUBLIC_ISSUER_URL: ${OIDC_PUBLIC_ISSUER_URL:-http://localhost:5556/dex}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-acornops-control-plane}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-acornops-control-plane-secret}
      OIDC_TOKEN_ENDPOINT_AUTH_METHOD: ${OIDC_TOKEN_ENDPOINT_AUTH_METHOD:-client_secret_basic}
      OIDC_AUTHORIZATION_ENDPOINT_OVERRIDE: ${OIDC_AUTHORIZATION_ENDPOINT_OVERRIDE:-http://localhost:5556/dex/auth}
      OIDC_TOKEN_ENDPOINT_OVERRIDE: ${OIDC_TOKEN_ENDPOINT_OVERRIDE:-http://dex:5556/dex/token}
      OIDC_USERINFO_ENDPOINT_OVERRIDE: ${OIDC_USERINFO_ENDPOINT_OVERRIDE:-http://dex:5556/dex/userinfo}
      OIDC_JWKS_URI_OVERRIDE: ${OIDC_JWKS_URI_OVERRIDE:-http://dex:5556/dex/keys}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://${MANAGEMENT_CONSOLE_HOST:-console.acornops.localhost}:${EDGE_PROXY_HTTP_PORT:-8088}/api/v1/auth/oidc/callback}
      OIDC_USE_USERINFO: ${OIDC_USE_USERINFO:-true}
      ORCH_SERVICE_TOKEN: ${ORCH_SERVICE_TOKEN:-dev_orchestrator_token}
      EXECUTION_ENGINE_DISPATCH_TOKEN: ${EXECUTION_ENGINE_DISPATCH_TOKEN:-dev_execution_engine_dispatch_token}
      LLM_GATEWAY_URL: http://llm-gateway:8001
      LLM_GATEWAY_ADMIN_TOKEN: ${LLM_GATEWAY_ADMIN_TOKEN:-dev_orchestrator_token}
      LLM_GATEWAY_TIMEOUT_MS: ${LLM_GATEWAY_TIMEOUT_MS:-120000}
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-openai}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-gpt-5.5}
      LLM_ALLOWED_PROVIDERS: ${LLM_ALLOWED_PROVIDERS:-openai,anthropic,gemini}
      LLM_ALLOWED_MODELS: ${LLM_ALLOWED_MODELS:-gpt-5.5,gpt-5.4,gpt-5.4-mini,gpt-5.4-nano,gpt-5,gpt-5-mini,gpt-5-nano,claude-3-5-sonnet-latest,gemini-2.0-flash}
      LLM_REASONING_SUMMARIES_ENABLED: ${LLM_REASONING_SUMMARIES_ENABLED:-true}
      LLM_ALLOWED_REASONING_SUMMARY_MODES: ${LLM_ALLOWED_REASONING_SUMMARY_MODES:-off,auto,concise,detailed}
      LLM_ALLOWED_REASONING_EFFORTS: ${LLM_ALLOWED_REASONING_EFFORTS:-default,low,medium,high}
      AGENT_SYSTEM_INSTRUCTION: ${AGENT_SYSTEM_INSTRUCTION:-}
      AGENT_CONTEXT_MAX_TOKENS: ${AGENT_CONTEXT_MAX_TOKENS:-120000}
      AGENT_BUDGET_CENTS: ${AGENT_BUDGET_CENTS:-25}
      AGENT_LLM_TEMPERATURE: ${AGENT_LLM_TEMPERATURE:-0.2}
      AGENT_MAX_RUNTIME_MS: ${AGENT_MAX_RUNTIME_MS:-600000}
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-16}
      AGENT_MAX_TOOL_CALLS: ${AGENT_MAX_TOOL_CALLS:-24}
      AGENT_MAX_DUPLICATE_TOOL_CALLS: ${AGENT_MAX_DUPLICATE_TOOL_CALLS:-2}
      AGENT_TOOL_DEFAULT_TIMEOUT_MS: ${AGENT_TOOL_DEFAULT_TIMEOUT_MS:-10000}
      BUILTIN_MCP_SERVER_NAME: ${BUILTIN_MCP_SERVER_NAME:-}
      BUILTIN_MCP_SERVER_URL: ${BUILTIN_MCP_SERVER_URL:-}
      BUILTIN_MCP_SERVER_DISPLAY_NAME: ${BUILTIN_MCP_SERVER_DISPLAY_NAME:-}
      GATEWAY_SIGNING_PRIVATE_KEY_PEM_B64: ${GATEWAY_SIGNING_PRIVATE_KEY_PEM_B64:-}
      GATEWAY_VERIFICATION_JWKS_JSON: ${GATEWAY_VERIFICATION_JWKS_JSON:-}
      WEBHOOK_SECRET_ENCRYPTION_KEY: ${WEBHOOK_SECRET_ENCRYPTION_KEY:-SglIGBscu1EgQ+AlpqJLADNN9QmCzS9d1ZvK3oT/e5s=}
    ports:
      - "${CONTROL_PLANE_PORT:-8081}:8081"
    volumes:
      - ../../../control-plane:/app
      - control-plane-node-modules:/app/node_modules

  control-plane-init:
    build:
      context: ../../../control-plane
      dockerfile: Dockerfile
      target: dev
    image: acornops/control-plane:local
    command: ["npm", "run", "db:migrate"]
    environment:
      DATABASE_URL: postgresql://${CP_DB_USER:-acornops}:${CP_DB_PASSWORD:-acornops}@cp-postgres:5432/${CP_DB_NAME:-acornops_control_plane}
    volumes:
      - ../../../control-plane:/app
      - control-plane-node-modules:/app/node_modules

  execution-engine:
    build:
      context: ../../../execution-engine
      dockerfile: Dockerfile
      target: test
    image: acornops/execution-engine:local
    command:
      [
        "uvicorn",
        "execution_engine.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--reload",
        "--reload-dir",
        "/app"
      ]
    environment:
      APP_ENV: development
      ORCH_BASE_URL: http://control-plane:8081
      ORCH_SERVICE_TOKEN: ${ORCH_SERVICE_TOKEN:-dev_orchestrator_token}
      EXECUTION_ENGINE_DISPATCH_TOKEN: ${EXECUTION_ENGINE_DISPATCH_TOKEN:-dev_execution_engine_dispatch_token}
      EXECUTION_GATEWAY_BASE_URL: http://llm-gateway:8001
      ENABLE_API_DOCS: ${EE_ENABLE_API_DOCS:-true}
      REDIS_URL: ${EXECUTION_ENGINE_REDIS_URL:-redis://:${CP_REDIS_PASSWORD:-dev_cp_redis_password}@cp-redis:6379/1}
      EXECUTION_DURABILITY_KEY_PREFIX: ${EXECUTION_DURABILITY_KEY_PREFIX:-execution-engine}
      TERMINAL_RUN_TTL_SECONDS: ${TERMINAL_RUN_TTL_SECONDS:-3600}
      TERMINAL_COMMIT_RETENTION_SECONDS: ${TERMINAL_COMMIT_RETENTION_SECONDS:-86400}
      TERMINAL_COMMIT_RETRY_INTERVAL_SECONDS: ${TERMINAL_COMMIT_RETRY_INTERVAL_SECONDS:-5}
      STALE_ACTIVE_RUN_RECOVERY_ON_STARTUP: ${STALE_ACTIVE_RUN_RECOVERY_ON_STARTUP:-true}
    ports:
      - "${EXECUTION_ENGINE_PORT:-8080}:8080"
    volumes:
      - ../../../execution-engine:/app

  llm-gateway:
    build:
      context: ../../../llm-gateway
      dockerfile: deployments/Dockerfile.gateway
    image: acornops/llm-gateway:local
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--reload",
        "--reload-dir",
        "/app"
      ]
    environment:
      APP_ENV: development
      PYTHONDONTWRITEBYTECODE: "1"
      SECRETS_BACKEND: ${SECRETS_BACKEND:-database}
      SECRETS_KEK_BASE64: ${SECRETS_KEK_BASE64:-SglIGBscu1EgQ+AlpqJLADNN9QmCzS9d1ZvK3oT/e5s=}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
      VAULT_MOUNT: ${VAULT_MOUNT:-secret}
      VAULT_PATH_PREFIX: ${VAULT_PATH_PREFIX:-acornops}
      VAULT_TIMEOUT_MS: ${VAULT_TIMEOUT_MS:-5000}
      VAULT_VERIFY_TLS: ${VAULT_VERIFY_TLS:-false}
      AUTH_JWKS_URL: http://control-plane:8081/api/v1/auth/jwks.json
      AUTH_ISSUER: llm-gateway
      AUTH_AUDIENCE: execution-gateway
      REQUIRE_JWKS_READINESS: "true"
      ENABLE_API_DOCS: ${GW_ENABLE_API_DOCS:-true}
      ADMIN_API_TOKEN: ${LLM_GATEWAY_ADMIN_TOKEN:-dev_orchestrator_token}
      LLM_ENABLE_DETERMINISTIC_DEV_RESPONSES: ${LLM_ENABLE_DETERMINISTIC_DEV_RESPONSES:-false}
    depends_on:
      mock-mcp:
        condition: service_started
    ports:
      - "${LLM_GATEWAY_PORT:-8001}:8001"
    volumes:
      - ../../../llm-gateway:/app

  llm-gateway-init:
    build:
      context: ../../../llm-gateway
      dockerfile: deployments/Dockerfile.gateway
    image: acornops/llm-gateway:local
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      SECRETS_BACKEND: ${SECRETS_BACKEND:-database}
      SECRETS_KEK_BASE64: ${SECRETS_KEK_BASE64:-SglIGBscu1EgQ+AlpqJLADNN9QmCzS9d1ZvK3oT/e5s=}
      ACORNOPS_DEV_SEED_OPENAI_API_KEY: ${ACORNOPS_DEV_SEED_OPENAI_API_KEY:-}
      ACORNOPS_DEV_SEED_ANTHROPIC_API_KEY: ${ACORNOPS_DEV_SEED_ANTHROPIC_API_KEY:-}
      ACORNOPS_DEV_SEED_GEMINI_API_KEY: ${ACORNOPS_DEV_SEED_GEMINI_API_KEY:-}
    command: ["sh", "-c", "alembic upgrade head && python scripts/seed_db.py"]
    depends_on:
      mock-mcp:
        condition: service_started
    volumes:
      - ../../../llm-gateway:/app

  mock-mcp:
    build:
      context: ../../../llm-gateway
      dockerfile: deployments/Dockerfile.mock-mcp
    command:
      [
        "uvicorn",
        "mock_mcp_server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8002",
        "--reload",
        "--reload-dir",
        "/app"
      ]
    ports:
      - "${MOCK_MCP_PORT:-8002}:8002"
    restart: unless-stopped
    networks:
      - acornops
    volumes:
      - ../../../llm-gateway/test:/app

  keycloak:
    profiles:
      - oidc-keycloak
    image: quay.io/keycloak/keycloak:26.1
    command: ["start-dev", "--import-realm", "--http-enabled=true", "--hostname-strict=false"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    volumes:
      - ../../../control-plane/deploy/keycloak/realm-acornops.json:/opt/keycloak/data/import/realm-acornops.json:ro
    ports:
      - "${KEYCLOAK_PORT:-8082}:8080"
    restart: unless-stopped
    networks:
      - acornops

  keycloak-postgres:
    profiles:
      - oidc-keycloak
    image: postgres:16
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - acornops

  dex:
    profiles:
      - oidc-dex
    image: ghcr.io/dexidp/dex:v2.39.1
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./oidc/dex/config.yaml:/etc/dex/config.yaml:ro
      - dex-data:/var/dex
    ports:
      - "5556:5556"
    restart: unless-stopped
    networks:
      - acornops

  vault:
    image: hashicorp/vault:1.16
    profiles:
      - local-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: ["vault", "server", "-dev"]
    ports:
      - "8200:8200"
    restart: unless-stopped
    networks:
      - acornops

  k8s-agent:
    build:
      context: ../../../k8s-agent
      dockerfile: Dockerfile
      target: dev
    image: acornops/k8s-agent:local
    command: ["npm", "run", "dev"]
    environment:
      ACORNOPS_AGENT_PLATFORM_URL: ws://control-plane:8081/api/v1/agent/connect
      ACORNOPS_AGENT_ALLOW_INSECURE_TRANSPORT: ${ACORNOPS_AGENT_ALLOW_INSECURE_TRANSPORT:-true}
      ACORNOPS_CLUSTER_ID: ${LOCAL_CLUSTER_ID:-5b006e4c-509c-458a-9f02-5aafbdc01ade}
      ACORNOPS_AGENT_KEY: ${LOCAL_AGENT_KEY:-ak_local_dev_shared_key}
      ACORNOPS_AGENT_KUBECONFIG_REWRITE_LOOPBACK: ${ACORNOPS_AGENT_KUBECONFIG_REWRITE_LOOPBACK:-true}
      ACORNOPS_AGENT_KUBECONFIG_HOST_ALIAS: ${ACORNOPS_AGENT_KUBECONFIG_HOST_ALIAS:-host.docker.internal}
      ACORNOPS_AGENT_KUBECONFIG_SKIP_TLS_VERIFY: ${ACORNOPS_AGENT_KUBECONFIG_SKIP_TLS_VERIFY:-true}
      ACORNOPS_AGENT_WATCH_NAMESPACES: ${ACORNOPS_AGENT_WATCH_NAMESPACES:-acornops-demo}
      ACORNOPS_AGENT_WRITE_ENABLED: ${ACORNOPS_AGENT_WRITE_ENABLED:-true}
      ACORNOPS_AGENT_LOCAL_FALLBACK_ENABLED: ${ACORNOPS_AGENT_LOCAL_FALLBACK_ENABLED:-true}
      ACORNOPS_AGENT_LOG_LEVEL: ${ACORNOPS_AGENT_LOG_LEVEL:-info}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      KUBECONFIG: /root/.kube/config
    depends_on:
      control-plane:
        condition: service_healthy
    volumes:
      - ../../../k8s-agent:/app
      - k8s-agent-node-modules:/app/node_modules
      - ${LOCAL_K8S_RUNTIME_DIR:-/tmp/acornops-local-kube}:/root/.kube:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - acornops

  vm-agent:
    build:
      context: ../../../vm-agent
      dockerfile: Dockerfile
      target: dev
    image: acornops/vm-agent:local
    command: ["npm", "run", "dev"]
    environment:
      ACORNOPS_AGENT_PLATFORM_URL: http://control-plane:8081
      ACORNOPS_AGENT_ALLOW_INSECURE_TRANSPORT: ${ACORNOPS_AGENT_ALLOW_INSECURE_TRANSPORT:-true}
      ACORNOPS_TARGET_ID: ${LOCAL_VM_TARGET_ID:-9254df42-4d9b-4e63-8bb6-93442e7d9a45}
      ACORNOPS_AGENT_KEY: ${LOCAL_VM_AGENT_KEY:-ak_local_vm_dev_shared_key}
      ACORNOPS_AGENT_TARGET_TYPE: virtual_machine
      ACORNOPS_AGENT_LOG_LEVEL: ${ACORNOPS_AGENT_LOG_LEVEL:-info}
      ACORNOPS_AGENT_SNAPSHOT_INTERVAL_MS: ${ACORNOPS_VM_AGENT_SNAPSHOT_INTERVAL_MS:-15000}
      ACORNOPS_VM_COLLECTOR_MODE: ${ACORNOPS_VM_COLLECTOR_MODE:-mock}
      ACORNOPS_VM_OS_FAMILY: linux
      ACORNOPS_VM_SERVICE_MANAGER: systemd
      ACORNOPS_VM_ALLOWED_LOG_SOURCES: ${ACORNOPS_VM_ALLOWED_LOG_SOURCES:-journald,syslog}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    depends_on:
      control-plane:
        condition: service_healthy
    volumes:
      - ../../../vm-agent:/app
      - vm-agent-node-modules:/app/node_modules
    restart: unless-stopped
    networks:
      - acornops

volumes:
  management-console-node-modules:
  control-plane-node-modules:
  k8s-agent-node-modules:
  vm-agent-node-modules:
  keycloak-postgres-data:
  dex-data:
