name: acornops-platform

services:
  management-console:
    image: ${MANAGEMENT_CONSOLE_IMAGE:-ghcr.io/acornops/management-console:0.0.1-experimental.20}
    depends_on:
      control-plane:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - acornops

  edge-proxy:
    image: nginx:1.27-alpine
    profiles:
      - prod
    environment:
      MANAGEMENT_CONSOLE_UPSTREAM: ${MANAGEMENT_CONSOLE_UPSTREAM:-management-console:8080}
      API_HOST: ${API_HOST:-api.${BASE_DOMAIN:-acornops.dev}}
      MANAGEMENT_CONSOLE_HOST: ${MANAGEMENT_CONSOLE_HOST:-console.${BASE_DOMAIN:-acornops.dev}}
    depends_on:
      management-console:
        condition: service_started
      control-plane:
        condition: service_healthy
      execution-engine:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
    ports:
      - "${EDGE_PROXY_HTTP_PORT:-80}:80"
    volumes:
      - ./proxy/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: unless-stopped
    networks:
      - acornops

  control-plane:
    image: ${CONTROL_PLANE_IMAGE:-ghcr.io/acornops/control-plane:0.0.1-experimental.20}
    environment:
      NODE_ENV: production
      PORT: 8081
      LOG_LEVEL: info
      ENABLE_API_DOCS: ${CP_ENABLE_API_DOCS:-false}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      CONTROL_PLANE_BASE_URL: ${CONTROL_PLANE_BASE_URL:-https://api.${BASE_DOMAIN:-acornops.dev}}
      MANAGEMENT_CONSOLE_BASE_URL: ${MANAGEMENT_CONSOLE_BASE_URL:-https://console.${BASE_DOMAIN:-acornops.dev}}
      CONTROL_PLANE_DISTRIBUTED_ROUTING_ENABLED: ${CONTROL_PLANE_DISTRIBUTED_ROUTING_ENABLED:-true}
      CONTROL_PLANE_AGENT_OWNER_TTL_SECONDS: ${CONTROL_PLANE_AGENT_OWNER_TTL_SECONDS:-90}
      CONTROL_PLANE_AGENT_SNAPSHOT_INTERVAL_SECONDS: ${CONTROL_PLANE_AGENT_SNAPSHOT_INTERVAL_SECONDS:-60}
      AUTOMATION_RUNTIME_MODE: ${AUTOMATION_RUNTIME_MODE:-off}
      AUTOMATION_CANARY_WORKSPACE_IDS: ${AUTOMATION_CANARY_WORKSPACE_IDS:-}
      AUTOMATION_WORKER_INTERVAL_MS: ${AUTOMATION_WORKER_INTERVAL_MS:-1000}
      AGENT_WS_MAX_PAYLOAD_BYTES: ${AGENT_WS_MAX_PAYLOAD_BYTES:-3145728}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://console.${BASE_DOMAIN:-acornops.dev}}
      SESSION_COOKIE_NAME: acornops_cp_session
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-604800}
      SESSION_IDLE_TIMEOUT_SECONDS: ${SESSION_IDLE_TIMEOUT_SECONDS:-86400}
      CSRF_SECRET: ${CSRF_SECRET:-change-me}
      CONVERSATION_RETENTION_DAYS: ${CONVERSATION_RETENTION_DAYS:-30}
      CONVERSATION_RETENTION_JOB_INTERVAL_SECONDS: ${CONVERSATION_RETENTION_JOB_INTERVAL_SECONDS:-3600}
      TOOL_RESULT_ARTIFACT_RETENTION_DAYS: ${TOOL_RESULT_ARTIFACT_RETENTION_DAYS:-7}
      TOOL_RESULT_ARTIFACT_MAX_BYTES: ${TOOL_RESULT_ARTIFACT_MAX_BYTES:-2097152}
      TARGET_CHAT_REPORT_RETENTION_DAYS: ${TARGET_CHAT_REPORT_RETENTION_DAYS:-30}
      TARGET_CHAT_RECENT_ACTIVITY_WINDOW_SECONDS: ${TARGET_CHAT_RECENT_ACTIVITY_WINDOW_SECONDS:-300}
      RUN_EVENT_BUFFER_SIZE: ${RUN_EVENT_BUFFER_SIZE:-200}
      PERSIST_RUN_EVENTS: ${PERSIST_RUN_EVENTS:-true}
      WORKSPACE_ROLES_CONFIG_JSON: ${WORKSPACE_ROLES_CONFIG_JSON:-}
      WORKSPACE_PLANS_CONFIG_JSON: ${WORKSPACE_PLANS_CONFIG_JSON:-}
      CONTROL_PLANE_ADMIN_API_ENABLED: ${CONTROL_PLANE_ADMIN_API_ENABLED:-false}
      CONTROL_PLANE_ADMIN_TOKENS_JSON: ${CONTROL_PLANE_ADMIN_TOKENS_JSON:-[]}
      SEED_DEVELOPMENT_DATA: "false"
      AGENTK_HELM_RELEASE_NAME: ${AGENTK_HELM_RELEASE_NAME:-acornops-agentk}
      AGENTK_HELM_CHART_REF: ${AGENTK_HELM_CHART_REF:-oci://ghcr.io/acornops/charts/acornops-agentk}
      AGENTK_HELM_CHART_VERSION: ${AGENTK_HELM_CHART_VERSION:-}
      AGENTK_HELM_NAMESPACE: ${AGENTK_HELM_NAMESPACE:-acornops-agentk}
      AGENTK_HELM_VALUES_JSON: ${AGENTK_HELM_VALUES_JSON:-}
      AGENTK_HELM_ADDITIONAL_CA_FILE_PATH: ${AGENTK_HELM_ADDITIONAL_CA_FILE_PATH:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-keycloak}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-https://keycloak.${BASE_DOMAIN:-acornops.dev}/realms/acornops}
      OIDC_PUBLIC_ISSUER_URL: ${OIDC_PUBLIC_ISSUER_URL:-https://keycloak.${BASE_DOMAIN:-acornops.dev}/realms/acornops}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-acornops-control-plane}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-change-me}
      OIDC_TOKEN_ENDPOINT_AUTH_METHOD: ${OIDC_TOKEN_ENDPOINT_AUTH_METHOD:-client_secret_basic}
      OIDC_AUTHORIZATION_ENDPOINT_OVERRIDE: ${OIDC_AUTHORIZATION_ENDPOINT_OVERRIDE:-}
      OIDC_TOKEN_ENDPOINT_OVERRIDE: ${OIDC_TOKEN_ENDPOINT_OVERRIDE:-}
      OIDC_USERINFO_ENDPOINT_OVERRIDE: ${OIDC_USERINFO_ENDPOINT_OVERRIDE:-}
      OIDC_JWKS_URI_OVERRIDE: ${OIDC_JWKS_URI_OVERRIDE:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-https://console.${BASE_DOMAIN:-acornops.dev}/api/v1/auth/oidc/callback}
      OIDC_SCOPES: openid profile email
      OIDC_USE_USERINFO: ${OIDC_USE_USERINFO:-true}
      PASSWORD_AUTH_ENABLED: ${PASSWORD_AUTH_ENABLED:-true}
      PASSWORD_SIGNUP_ENABLED: ${PASSWORD_SIGNUP_ENABLED:-false}
      PASSWORD_EMAIL_VERIFICATION_REQUIRED: ${PASSWORD_EMAIL_VERIFICATION_REQUIRED:-true}
      PASSWORD_EMAIL_VERIFICATION_TOKEN_TTL_SECONDS: ${PASSWORD_EMAIL_VERIFICATION_TOKEN_TTL_SECONDS:-86400}
      PASSWORD_EMAIL_VERIFICATION_RESEND_WINDOW_SECONDS: ${PASSWORD_EMAIL_VERIFICATION_RESEND_WINDOW_SECONDS:-300}
      PASSWORD_SIGNUP_ALLOW_UNVERIFIED_EMAIL: ${PASSWORD_SIGNUP_ALLOW_UNVERIFIED_EMAIL:-false}
      PASSWORD_RESET_ENABLED: ${PASSWORD_RESET_ENABLED:-true}
      PASSWORD_RESET_TOKEN_TTL_SECONDS: ${PASSWORD_RESET_TOKEN_TTL_SECONDS:-3600}
      PASSWORD_RESET_REQUEST_WINDOW_SECONDS: ${PASSWORD_RESET_REQUEST_WINDOW_SECONDS:-300}
      PASSWORD_AUTH_IDENTIFIER_MAX_ATTEMPTS: ${PASSWORD_AUTH_IDENTIFIER_MAX_ATTEMPTS:-50}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-smtp}
      EMAIL_DELIVERY_ALLOW_LOG_IN_PRODUCTION: ${EMAIL_DELIVERY_ALLOW_LOG_IN_PRODUCTION:-false}
      EMAIL_FROM: ${EMAIL_FROM:-AcornOps <noreply@${BASE_DOMAIN:-acornops.dev}>}
      EMAIL_PUBLIC_BASE_URL: ${EMAIL_PUBLIC_BASE_URL:-https://console.${BASE_DOMAIN:-acornops.dev}}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-true}
      ORCH_SERVICE_TOKEN: ${ORCH_SERVICE_TOKEN:-change-me}
      EXTERNAL_INTEGRATION_CLIENTS_JSON: ${EXTERNAL_INTEGRATION_CLIENTS_JSON:?set EXTERNAL_INTEGRATION_CLIENTS_JSON}
      EXTERNAL_INTEGRATION_LINK_TOKEN_TTL_SECONDS: ${EXTERNAL_INTEGRATION_LINK_TOKEN_TTL_SECONDS:-600}
      EXTERNAL_INTEGRATION_LINK_TTL_SECONDS: ${EXTERNAL_INTEGRATION_LINK_TTL_SECONDS:-2592000}
      EXTERNAL_INTEGRATION_LINK_TOKEN_RETENTION_DAYS: ${EXTERNAL_INTEGRATION_LINK_TOKEN_RETENTION_DAYS:-30}
      EXECUTION_ENGINE_BASE_URL: ${EXECUTION_ENGINE_BASE_URL:-http://execution-engine:8080}
      EXECUTION_ENGINE_DISPATCH_TOKEN: ${EXECUTION_ENGINE_DISPATCH_TOKEN:-change-me}
      EXECUTION_ENGINE_TIMEOUT_MS: 10000
      DATABASE_URL: postgresql://${CP_DB_USER:-acornops}:${CP_DB_PASSWORD:-acornops}@cp-postgres:5432/${CP_DB_NAME:-acornops_control_plane}
      REDIS_URL: redis://:${CP_REDIS_PASSWORD:?set CP_REDIS_PASSWORD}@cp-redis:6379/0
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-http://llm-gateway:8001}
      LLM_GATEWAY_ADMIN_TOKEN: ${LLM_GATEWAY_ADMIN_TOKEN:-change-me}
      LLM_GATEWAY_TIMEOUT_MS: ${LLM_GATEWAY_TIMEOUT_MS:-120000}
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-openai}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-gpt-5.5}
      LLM_ALLOWED_PROVIDERS: ${LLM_ALLOWED_PROVIDERS:-openai,anthropic,gemini}
      LLM_ALLOWED_PROVIDER_MODELS: ${LLM_ALLOWED_PROVIDER_MODELS:-openai:gpt-5.5|gpt-5.4|gpt-5.4-mini|gpt-5.4-nano|gpt-5|gpt-5-mini|gpt-5-nano;anthropic:claude-fable-5|claude-opus-4-8|claude-sonnet-4-6|claude-haiku-4-5;gemini:gemini-3.5-flash|gemini-3.5-flash-lite|gemini-3.1-pro|gemini-3.1-flash|gemini-3.1-flash-lite|gemini-2.5-pro|gemini-2.5-flash|gemini-2.5-flash-lite|gemini-2.0-flash|gemini-2.0-flash-lite}
      LLM_REASONING_SUMMARIES_ENABLED: ${LLM_REASONING_SUMMARIES_ENABLED:-true}
      LLM_ALLOWED_REASONING_SUMMARY_MODES: ${LLM_ALLOWED_REASONING_SUMMARY_MODES:-off,auto,concise,detailed}
      LLM_ALLOWED_REASONING_EFFORTS: ${LLM_ALLOWED_REASONING_EFFORTS:-off,low,medium,high}
      ASSISTANT_SYSTEM_INSTRUCTION: ${ASSISTANT_SYSTEM_INSTRUCTION:-}
      ASSISTANT_CONTEXT_MAX_TOKENS: ${ASSISTANT_CONTEXT_MAX_TOKENS:-120000}
      ASSISTANT_BUDGET_CENTS: ${ASSISTANT_BUDGET_CENTS:-25}
      ASSISTANT_LLM_TEMPERATURE: ${ASSISTANT_LLM_TEMPERATURE:-0.2}
      ASSISTANT_MAX_RUNTIME_MS: ${ASSISTANT_MAX_RUNTIME_MS:-600000}
      ASSISTANT_MAX_STEPS: ${ASSISTANT_MAX_STEPS:-16}
      ASSISTANT_MAX_TOOL_CALLS: ${ASSISTANT_MAX_TOOL_CALLS:-24}
      ASSISTANT_MAX_DUPLICATE_TOOL_CALLS: ${ASSISTANT_MAX_DUPLICATE_TOOL_CALLS:-2}
      ASSISTANT_TOOL_DEFAULT_TIMEOUT_MS: ${ASSISTANT_TOOL_DEFAULT_TIMEOUT_MS:-10000}
      ASSISTANT_WRITE_CONFIRMATION_REQUIRED: ${ASSISTANT_WRITE_CONFIRMATION_REQUIRED:-true}
      ASSISTANT_WRITE_CONFIRMATION_TIMEOUT_SECONDS: ${ASSISTANT_WRITE_CONFIRMATION_TIMEOUT_SECONDS:-900}
      BUILTIN_TARGET_MCP_SERVER_NAME: ${BUILTIN_TARGET_MCP_SERVER_NAME:-}
      BUILTIN_TARGET_MCP_SERVER_URL: ${BUILTIN_TARGET_MCP_SERVER_URL:-}
      BUILTIN_TARGET_MCP_SERVER_DISPLAY_NAME: ${BUILTIN_TARGET_MCP_SERVER_DISPLAY_NAME:-}
      GATEWAY_TOKEN_ISSUER: llm-gateway
      GATEWAY_TOKEN_AUDIENCE: execution-gateway
      GATEWAY_TOKEN_TTL_SECONDS: 900
      GATEWAY_SIGNING_KID: ${GATEWAY_SIGNING_KID:-cp-rs256-1}
      GATEWAY_SIGNING_PRIVATE_KEY_PEM_B64: ${GATEWAY_SIGNING_PRIVATE_KEY_PEM_B64:-change-me}
      GATEWAY_VERIFICATION_JWKS_JSON: ${GATEWAY_VERIFICATION_JWKS_JSON:-}
      WEBHOOK_SECRET_ENCRYPTION_KEY: ${WEBHOOK_SECRET_ENCRYPTION_KEY:-change-me}
      WEBHOOK_EGRESS_ALLOWED_PRIVATE_HOSTS_JSON: ${WEBHOOK_EGRESS_ALLOWED_PRIVATE_HOSTS_JSON:-[]}
    depends_on:
      cp-postgres:
        condition: service_healthy
      control-plane-init:
        condition: service_completed_successfully
      cp-redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8081/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - acornops

  control-plane-init:
    image: ${CONTROL_PLANE_IMAGE:-ghcr.io/acornops/control-plane:0.0.1-experimental.20}
    environment:
      DATABASE_URL: postgresql://${CP_DB_USER:-acornops}:${CP_DB_PASSWORD:-acornops}@cp-postgres:5432/${CP_DB_NAME:-acornops_control_plane}
    command: ["node", "dist/scripts/control-plane-db.js", "migrate"]
    depends_on:
      cp-postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - acornops

  execution-engine:
    image: ${EXECUTION_ENGINE_IMAGE:-ghcr.io/acornops/execution-engine:0.0.1-experimental.9}
    environment:
      APP_ENV: production
      ORCH_BASE_URL: ${ORCH_BASE_URL:-http://control-plane:8081}
      ORCH_SERVICE_TOKEN: ${ORCH_SERVICE_TOKEN:-change-me}
      EXECUTION_ENGINE_DISPATCH_TOKEN: ${EXECUTION_ENGINE_DISPATCH_TOKEN:-change-me}
      EXECUTION_GATEWAY_BASE_URL: ${EXECUTION_GATEWAY_BASE_URL:-http://llm-gateway:8001}
      HTTP_PORT: 8080
      LOG_LEVEL: INFO
      ENABLE_API_DOCS: ${EE_ENABLE_API_DOCS:-false}
      REDIS_URL: ${EXECUTION_ENGINE_REDIS_URL:-redis://:${CP_REDIS_PASSWORD:?set CP_REDIS_PASSWORD}@cp-redis:6379/1}
      EXECUTION_DURABILITY_KEY_PREFIX: ${EXECUTION_DURABILITY_KEY_PREFIX:-execution-engine}
      TERMINAL_RUN_TTL_SECONDS: ${TERMINAL_RUN_TTL_SECONDS:-3600}
      TERMINAL_COMMIT_RETENTION_SECONDS: ${TERMINAL_COMMIT_RETENTION_SECONDS:-86400}
      TERMINAL_COMMIT_RETRY_INTERVAL_SECONDS: ${TERMINAL_COMMIT_RETRY_INTERVAL_SECONDS:-5}
      STALE_ACTIVE_RUN_RECOVERY_ON_STARTUP: ${STALE_ACTIVE_RUN_RECOVERY_ON_STARTUP:-true}
      READINESS_CHECK_TIMEOUT_MS: ${EE_READINESS_CHECK_TIMEOUT_MS:-1000}
      RUN_ID_LOCK_TTL_SECONDS: ${RUN_ID_LOCK_TTL_SECONDS:-900}
      ORCH_RETRY_MAX_ELAPSED_SECONDS: ${ORCH_RETRY_MAX_ELAPSED_SECONDS:-30}
      GATEWAY_STREAM_IDLE_TIMEOUT_SECONDS: ${GATEWAY_STREAM_IDLE_TIMEOUT_SECONDS:-60}
      TOOL_CALL_TIMEOUT_SECONDS: ${TOOL_CALL_TIMEOUT_SECONDS:-30}
      TOOL_CONTEXT_MAX_BYTES: ${TOOL_CONTEXT_MAX_BYTES:-12288}
      TOOL_CONTEXT_RUN_MAX_BYTES: ${TOOL_CONTEXT_RUN_MAX_BYTES:-49152}
      TOOL_GATEWAY_MAX_RESPONSE_BYTES: ${TOOL_GATEWAY_MAX_RESPONSE_BYTES:-5242880}
      DISPATCH_REQUEST_TIMEOUT_SECONDS: ${DISPATCH_REQUEST_TIMEOUT_SECONDS:-10}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-1000000}
    depends_on:
      control-plane:
        condition: service_healthy
      cp-redis:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/ready')"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - acornops

  llm-gateway:
    image: ${LLM_GATEWAY_IMAGE:-ghcr.io/acornops/llm-gateway:0.0.1-experimental.11}
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${GATEWAY_DB_USER:-gateway_user}:${GATEWAY_DB_PASSWORD:-gateway_password}@gateway-postgres:5432/${GATEWAY_DB_NAME:-gateway}
      REDIS_URL: redis://:${GATEWAY_REDIS_PASSWORD:?set GATEWAY_REDIS_PASSWORD}@gateway-redis:6379/0
      SECRETS_BACKEND: ${SECRETS_BACKEND:-database}
      SECRETS_CACHE_TTL_SEC: ${SECRETS_CACHE_TTL_SEC:-0}
      SECRETS_KEK_BASE64: ${SECRETS_KEK_BASE64:-change-me}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
      VAULT_MOUNT: ${VAULT_MOUNT:-secret}
      VAULT_PATH_PREFIX: ${VAULT_PATH_PREFIX:-acornops}
      VAULT_TIMEOUT_MS: ${VAULT_TIMEOUT_MS:-5000}
      VAULT_VERIFY_TLS: ${VAULT_VERIFY_TLS:-true}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-http://control-plane:8081/api/v1/auth/jwks.json}
      AUTH_ISSUER: llm-gateway
      AUTH_AUDIENCE: execution-gateway
      JWKS_CACHE_TTL_SECONDS: ${JWKS_CACHE_TTL_SECONDS:-300}
      JWKS_READINESS_MAX_STALENESS_SECONDS: ${JWKS_READINESS_MAX_STALENESS_SECONDS:-900}
      REQUIRE_JWKS_READINESS: ${REQUIRE_JWKS_READINESS:-true}
      ENABLE_API_DOCS: ${GW_ENABLE_API_DOCS:-false}
      ADMIN_API_TOKEN: ${LLM_GATEWAY_ADMIN_TOKEN:-change-me}
      BUILTIN_MCP_MAX_RESPONSE_BYTES: ${BUILTIN_MCP_MAX_RESPONSE_BYTES:-3145728}
      REMOTE_MCP_ENABLED: ${REMOTE_MCP_ENABLED:-true}
      MCP_CONNECTION_RATE_LIMIT_PER_WINDOW: ${MCP_CONNECTION_RATE_LIMIT_PER_WINDOW:-10}
      MCP_EGRESS_ALLOWED_HOSTS: ${MCP_EGRESS_ALLOWED_HOSTS:-}
      MCP_EGRESS_ALLOW_PRIVATE_NETWORKS: ${MCP_EGRESS_ALLOW_PRIVATE_NETWORKS:-false}
      MCP_EGRESS_ALLOW_LOCAL_ADDRESSES: ${MCP_EGRESS_ALLOW_LOCAL_ADDRESSES:-false}
      CATALOG_OFFICIAL_REGISTRY_ENABLED: ${CATALOG_OFFICIAL_REGISTRY_ENABLED:-false}
      CATALOG_OFFICIAL_REGISTRY_URL: ${CATALOG_OFFICIAL_REGISTRY_URL:-https://registry.modelcontextprotocol.io}
      CATALOG_WORKSPACE_MANAGED_SOURCES_ENABLED: ${CATALOG_WORKSPACE_MANAGED_SOURCES_ENABLED:-true}
      CATALOG_BOOTSTRAP_SOURCES_JSON: ${CATALOG_BOOTSTRAP_SOURCES_JSON:-[]}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      LLM_RATE_LIMIT_PER_WINDOW: ${LLM_RATE_LIMIT_PER_WINDOW:-100}
      TOOL_RATE_LIMIT_PER_WINDOW: ${TOOL_RATE_LIMIT_PER_WINDOW:-200}
      REQUIRE_REDIS_RATE_LIMITS_IN_PRODUCTION: ${REQUIRE_REDIS_RATE_LIMITS_IN_PRODUCTION:-true}
      MAX_REQUEST_BODY_BYTES: ${LLM_GATEWAY_MAX_REQUEST_BODY_BYTES:-1000000}
      LLM_PROVIDER_OPENAI_BASE_URL: ${LLM_PROVIDER_OPENAI_BASE_URL:-}
      LLM_PROVIDER_ANTHROPIC_BASE_URL: ${LLM_PROVIDER_ANTHROPIC_BASE_URL:-}
      LLM_PROVIDER_GEMINI_BASE_URL: ${LLM_PROVIDER_GEMINI_BASE_URL:-}
    depends_on:
      gateway-postgres:
        condition: service_healthy
      gateway-redis:
        condition: service_healthy
      llm-gateway-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/ready')"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - acornops

  llm-gateway-init:
    image: ${LLM_GATEWAY_IMAGE:-ghcr.io/acornops/llm-gateway:0.0.1-experimental.11}
    environment:
      DATABASE_URL: postgresql+asyncpg://${GATEWAY_DB_USER:-gateway_user}:${GATEWAY_DB_PASSWORD:-gateway_password}@gateway-postgres:5432/${GATEWAY_DB_NAME:-gateway}
      REDIS_URL: redis://:${GATEWAY_REDIS_PASSWORD:?set GATEWAY_REDIS_PASSWORD}@gateway-redis:6379/0
      SECRETS_BACKEND: ${SECRETS_BACKEND:-database}
      SECRETS_CACHE_TTL_SEC: ${SECRETS_CACHE_TTL_SEC:-0}
      SECRETS_KEK_BASE64: ${SECRETS_KEK_BASE64:-change-me}
    command: ["sh", "-c", "alembic upgrade head"]
    depends_on:
      gateway-postgres:
        condition: service_healthy
      gateway-redis:
        condition: service_healthy
    restart: "no"
    networks:
      - acornops

  cp-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${CP_DB_USER:-acornops}
      POSTGRES_PASSWORD: ${CP_DB_PASSWORD:-acornops}
      POSTGRES_DB: ${CP_DB_NAME:-acornops_control_plane}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CP_DB_USER:-acornops} -d ${CP_DB_NAME:-acornops_control_plane}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - cp-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - acornops

  cp-redis:
    image: redis:7-alpine
    environment:
      CP_REDIS_PASSWORD: ${CP_REDIS_PASSWORD:?set CP_REDIS_PASSWORD}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${CP_REDIS_PASSWORD}\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${CP_REDIS_PASSWORD}\" ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - cp-redis-data:/data
    restart: unless-stopped
    networks:
      - acornops

  gateway-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${GATEWAY_DB_USER:-gateway_user}
      POSTGRES_PASSWORD: ${GATEWAY_DB_PASSWORD:-gateway_password}
      POSTGRES_DB: ${GATEWAY_DB_NAME:-gateway}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GATEWAY_DB_USER:-gateway_user} -d ${GATEWAY_DB_NAME:-gateway}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - gateway-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - acornops

  gateway-redis:
    image: redis:7-alpine
    environment:
      GATEWAY_REDIS_PASSWORD: ${GATEWAY_REDIS_PASSWORD:?set GATEWAY_REDIS_PASSWORD}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${GATEWAY_REDIS_PASSWORD}\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${GATEWAY_REDIS_PASSWORD}\" ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - gateway-redis-data:/data
    restart: unless-stopped
