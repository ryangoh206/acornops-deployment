services:
  mock-mcp:
    profiles: ["integration-test"]
    build:
      context: ../../../llm-gateway
      dockerfile: deployments/Dockerfile.mock-mcp
    command: ["uvicorn", "mock_mcp_server:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "${MOCK_MCP_PORT:-8002}:8002"
    networks:
      - acornops
    volumes:
      - ../../../llm-gateway/test:/app:ro
